meters:
  - name: distribution_agreement
    description: NDC / GDS / direct distribution agreement covering API and content access.
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: API consumption is not separately metered. Track query volume against the negotiated
      partner SLA rather than dollar-per-call.
  - name: Allocation
    description: Allocate United integration cost to the travel-procurement or distribution function;
      ticket cost is the dominant downstream financial line.
  - name: Optimization
    description: Optimize at the contract level - NDC vs GDS routing, corporate-rate consolidation,
      caching availability calls - rather than per-API-call.
  - name: Accountability
    description: Assign ownership to the team that holds the United distribution contract; review
      partner usage reports against contracted volumes.
