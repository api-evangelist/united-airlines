description: United Airlines does not publish a self-serve API pricing page. Programmatic access
  to United (booking, NDC content, schedules, baggage, loyalty) is brokered through partner programs
  - GDS / NDC distribution partners, travel-agency contracts, and corporate / OTA agreements - rather
  than priced as a developer product.
sources:
  - https://www.united.com
notes: No public API pricing page exists. Programmatic content is delivered through NDC and GDS partner
  channels under bilateral commercial agreements; there is no developer self-serve plan to reconcile.
plans:
  - id: united-airlines-contact-sales
    name: Contact Sales
    type: enterprise
    description: All United Airlines API/content access is via NDC, GDS, or direct distribution partner
      agreements.
