naftiko: "1.0.0-alpha1"

info:
  label: "United Airlines NDC API"
  description: "United Airlines NDC API for flight shopping, booking, and servicing including continuous pricing, bundled fares, and ancillary management."
  tags:
    - Airlines
    - Travel
    - Flight Booking
    - NDC
    - Shopping
    - Servicing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UNITED_AIRLINES_OAUTH_TOKEN: UNITED_AIRLINES_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: united-airlines-ndc
      baseUri: https://api.united.com/v1
      description: "United Airlines NDC API for flight shopping, booking, and servicing."
      authentication:
        type: bearer
        token: "{{UNITED_AIRLINES_OAUTH_TOKEN}}"
      resources:
        - name: shopping
          path: /shopping
          description: "Flight search and pricing"
          operations:
            - name: search-flight-offers
              method: POST
              description: "Search for available United Airlines flights with continuous pricing"
              inputParameters:
                - name: origin
                  in: body
                  type: string
                  required: true
                  description: "IATA origin airport code"
                - name: destination
                  in: body
                  type: string
                  required: true
                  description: "IATA destination airport code"
                - name: departureDate
                  in: body
                  type: string
                  required: true
                  description: "Outbound departure date (YYYY-MM-DD)"
                - name: cabinPreference
                  in: body
                  type: string
                  required: false
                  description: "Preferred cabin class"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-flight-offer
              method: GET
              description: "Retrieve detailed pricing and availability for a specific flight offer"
              inputParameters:
                - name: offerId
                  in: path
                  type: string
                  required: true
                  description: "Unique identifier of the flight offer"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: bookings
          path: /bookings
          description: "Flight bookings and reservation management"
          operations:
            - name: create-booking
              method: POST
              description: "Create a new flight booking with payment"
              inputParameters:
                - name: offerId
                  in: body
                  type: string
                  required: true
                  description: "Offer ID from shopping response"
                - name: holdBooking
                  in: body
                  type: boolean
                  required: false
                  description: "Create a held booking without immediate payment"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-bookings
              method: GET
              description: "Retrieve a list of bookings"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter bookings by status"
                - name: departureDate
                  in: query
                  type: string
                  required: false
                  description: "Filter by departure date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-booking
              method: GET
              description: "Retrieve details of a specific booking"
              inputParameters:
                - name: bookingId
                  in: path
                  type: string
                  required: true
                  description: "Unique booking identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-booking
              method: DELETE
              description: "Cancel an existing booking"
              inputParameters:
                - name: bookingId
                  in: path
                  type: string
                  required: true
                  description: "Unique booking identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: servicing
          path: /bookings
          description: "Post-booking modifications and ancillaries"
          operations:
            - name: exchange-booking
              method: POST
              description: "Modify booking by exchanging flights"
              inputParameters:
                - name: bookingId
                  in: path
                  type: string
                  required: true
                  description: "Unique booking identifier"
                - name: newOfferId
                  in: body
                  type: string
                  required: true
                  description: "New offer ID for the exchanged flights"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: refund-booking
              method: POST
              description: "Process a refund for a cancelled booking"
              inputParameters:
                - name: bookingId
                  in: path
                  type: string
                  required: true
                  description: "Unique booking identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-ancillary
              method: POST
              description: "Add ancillary services to an existing booking"
              inputParameters:
                - name: bookingId
                  in: path
                  type: string
                  required: true
                  description: "Unique booking identifier"
                - name: type
                  in: body
                  type: string
                  required: true
                  description: "Ancillary type (seat, bag, upgrade, insurance, lounge)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: flights
          path: /flights
          description: "Flight status and schedules"
          operations:
            - name: get-flight-status
              method: GET
              description: "Retrieve real-time flight status"
              inputParameters:
                - name: flightNumber
                  in: query
                  type: string
                  required: true
                  description: "United Airlines flight number"
                - name: date
                  in: query
                  type: string
                  required: true
                  description: "Flight date (YYYY-MM-DD)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-flight-schedules
              method: GET
              description: "Retrieve flight schedules for an origin-destination pair"
              inputParameters:
                - name: origin
                  in: query
                  type: string
                  required: true
                  description: "IATA origin airport code"
                - name: destination
                  in: query
                  type: string
                  required: true
                  description: "IATA destination airport code"
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "Start date for schedule query"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: united-airlines-ndc-api
      resources:
        - path: /v1/offers
          name: offers
          description: "Flight offer search"
          operations:
            - method: POST
              name: search-flight-offers
              description: "Search for available flights"
              call: "united-airlines-ndc.search-flight-offers"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/bookings
          name: bookings
          description: "Booking management"
          operations:
            - method: POST
              name: create-booking
              description: "Create a flight booking"
              call: "united-airlines-ndc.create-booking"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-bookings
              description: "List bookings"
              call: "united-airlines-ndc.list-bookings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/flights/status
          name: flight-status
          description: "Real-time flight status"
          operations:
            - method: GET
              name: get-flight-status
              description: "Get flight status"
              call: "united-airlines-ndc.get-flight-status"
              with:
                flightNumber: "rest.flightNumber"
                date: "rest.date"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: united-airlines-ndc-mcp
      transport: http
      tools:
        - name: search-flight-offers
          description: "Search for available United Airlines flights with pricing and bundles"
          hints:
            readOnly: true
            openWorld: true
          call: "united-airlines-ndc.search-flight-offers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-flight-offer
          description: "Get detailed pricing for a specific flight offer"
          hints:
            readOnly: true
            openWorld: true
          call: "united-airlines-ndc.get-flight-offer"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-booking
          description: "Create a new United Airlines flight booking"
          hints:
            readOnly: false
            destructive: false
          call: "united-airlines-ndc.create-booking"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-booking
          description: "Retrieve an existing booking by ID"
          hints:
            readOnly: true
            openWorld: false
          call: "united-airlines-ndc.get-booking"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-booking
          description: "Cancel a flight booking"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "united-airlines-ndc.cancel-booking"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-flight-status
          description: "Get real-time status for a United Airlines flight"
          hints:
            readOnly: true
            openWorld: true
          call: "united-airlines-ndc.get-flight-status"
          outputParameters:
            - type: object
              mapping: "$."
