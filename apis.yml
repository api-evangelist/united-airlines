name: United Airlines
description: >-
  United Airlines is a major American airline headquartered in Chicago, Illinois.
  It operates one of the largest route networks in the world with hubs in Chicago,
  Denver, Houston, Los Angeles, New York, San Francisco, and Washington, D.C.
  United provides NDC (New Distribution Capability) APIs for flight shopping,
  booking, and servicing, as well as corporate travel integration capabilities.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Airlines
  - Travel
  - Flight Booking
  - NDC
  - Loyalty
  - Fortune 100
apis:
  - name: United Airlines NDC API
    description: >-
      United Airlines NDC (New Distribution Capability) API enables travel agencies,
      online booking tools, and corporate travel platforms to search, book, and
      service United flights with full access to continuous pricing, dynamic bundled
      fares, ancillary products, hold bookings, exchanges, refunds, cancellations,
      schedule change alerts, and ARC/BSP reporting. Supports 30+ bundle combinations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://united.business/NDC-corporate
    baseURL: https://api.united.com/v1
    tags:
      - Airlines
      - Flight Booking
      - NDC
      - Travel
      - Shopping
      - Booking
      - Servicing
    properties:
      - type: Documentation
        url: https://united.business/NDC-corporate
      - type: NDC Capabilities
        url: https://united.business/NDC-capabilities
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/united-airlines/main/openapi/united-airlines-ndc-openapi.yml
    contact:
      - FN: United Airlines NDC Support
        email: ndcagency@united.com
  - name: United Airlines Flight Status API
    description: >-
      United Airlines Flight Status API providing real-time flight status including
      estimated and actual departure and arrival times, gate information, delays,
      and flight tracking for United-operated flights.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://api.developer.iata.org/united-airlines-united-airlines-default/api/flight-status2
    baseURL: https://api.united.com/v1
    tags:
      - Airlines
      - Flight Status
      - Real-Time
      - IATA
    properties:
      - type: Documentation
        url: https://api.developer.iata.org/united-airlines-united-airlines-default/api/flight-status2
